name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Audit dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2026-0194: Linux-only quick-xml transitive dependency via rfd;
          # not in the macOS build and the XML parsing path is unreachable. Revisit when rfd bumps.
          # RUSTSEC-2026-0195: Linux-only quick-xml transitive dependency via rfd;
          # not in the macOS build and the XML parsing path is unreachable. Revisit when rfd bumps.
          # RUSTSEC-2026-0186: Linux-only memmap2 transitive dependency via enigo;
          # not in the macOS build and the affected mmap paths are unreachable. Revisit when enigo bumps.
          ignore: RUSTSEC-2026-0194,RUSTSEC-2026-0195,RUSTSEC-2026-0186

  build-and-test:
    name: fmt · clippy · test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Build release
        run: cargo build --release
