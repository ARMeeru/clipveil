name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build release assets
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dry-run-${GITHUB_RUN_NUMBER}"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and sign app
        run: ./dist/build-app.sh

      - name: Package release assets
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent \
            dist/clipveil.app \
            "release/clipveil-${VERSION}-macos-arm64.zip"
          cp target/release/clipveil \
            "release/clipveil-${VERSION}-macos-arm64"

          cd release
          shasum -a 256 \
            "clipveil-${VERSION}-macos-arm64.zip" \
            "clipveil-${VERSION}-macos-arm64" \
            > SHA256SUMS.txt

      - name: Upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clipveil-${{ steps.version.outputs.value }}-macos-arm64
          path: |
            release/clipveil-${{ steps.version.outputs.value }}-macos-arm64.zip
            release/clipveil-${{ steps.version.outputs.value }}-macos-arm64
            release/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "clipveil $GITHUB_REF_NAME" \
            --notes-file dist/RELEASE_NOTES.md \
            "release/clipveil-${VERSION}-macos-arm64.zip" \
            "release/clipveil-${VERSION}-macos-arm64" \
            release/SHA256SUMS.txt
